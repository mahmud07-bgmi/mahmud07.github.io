<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WWCD Team Stats</title>

  <link rel="stylesheet" href="css/WWCD.css" />

  <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>

<body>

  <div class="overlay-bg"></div>

  <!-- TITLE -->
  <div class="title-wrap">
    <h1>WWCD TEAM STATS</h1>

    <!-- UNDERLINE -->
    <div class="title-underline"></div>
  </div>

  <!-- MAIN STATS -->
  <main class="stats-wrapper">

    <!-- PLAYER 1 -->
    <div class="stat-card">

      <div class="photo-box">
        <img id="p1-photo" src="assets/c1.png" alt="">
      </div>

      <div class="name-box" id="p1-name">
        PLAYER 1
      </div>

      <div class="finish-box">
        <span>FINISHES</span>
        <b id="p1-kills">0</b>
      </div>

      <div class="contri-box">
        <span>FIN CONTRI%</span>
        <b id="p1-contri">0%</b>
      </div>

    </div>

    <!-- PLAYER 2 -->
    <div class="stat-card">

      <div class="photo-box">
        <img id="p2-photo" src="assets/c2.png" alt="">
      </div>

      <div class="name-box" id="p2-name">
        PLAYER 2
      </div>

      <div class="finish-box">
        <span>FINISHES</span>
        <b id="p2-kills">0</b>
      </div>

      <div class="contri-box">
        <span>FIN CONTRI%</span>
        <b id="p2-contri">0%</b>
      </div>

    </div>

    <!-- TEAM CENTER CARD -->
    <div class="team-stat-card">

      <div class="team-logo-box">
        <img id="team-logo" src="" alt="Team Logo">
      </div>

      <div class="team-row">
        <span>FINISHES</span>
        <b id="team-finishes">0</b>
      </div>

      <div class="team-row">
        <span>TOTAL</span>
        <b id="team-total">0</b>
      </div>

    </div>

    <!-- PLAYER 3 -->
    <div class="stat-card">

      <div class="photo-box">
        <img id="p3-photo" src="assets/c3.png" alt="">
      </div>

      <div class="name-box" id="p3-name">
        PLAYER 3
      </div>

      <div class="finish-box">
        <span>FINISHES</span>
        <b id="p3-kills">0</b>
      </div>

      <div class="contri-box">
        <span>FIN CONTRI%</span>
        <b id="p3-contri">0%</b>
      </div>

    </div>

    <!-- PLAYER 4 -->
    <div class="stat-card">

      <div class="photo-box">
        <img id="p4-photo" src="assets/c4.png" alt="">
      </div>

      <div class="name-box" id="p4-name">
        PLAYER 4
      </div>

      <div class="finish-box">
        <span>FINISHES</span>
        <b id="p4-kills">0</b>
      </div>

      <div class="contri-box">
        <span>FIN CONTRI%</span>
        <b id="p4-contri">0%</b>
      </div>

    </div>

  </main>

  <script src="js/WWCD.js"></script>

</body>
</html>
