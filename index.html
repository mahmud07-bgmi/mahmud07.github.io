<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GS ESPORTS PRODUCTION</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top, #0B1220, #05080F);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      margin-bottom: 32px;
      font-size: 28px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(14,165,233,0.6);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 320px;
    }

    a {
      display: block;
      background: rgba(35, 38, 58, 0.6);
      color: #ffffff;
      text-decoration: none;
      padding: 18px;
      border-radius: 14px;
      font-size: 1.1em;
      text-align: center;
      transition: all 0.3s ease;
      border: 2px solid #0EA5E9;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 8px rgba(14,165,233,0.2);
    }

    a:hover {
      background: #0EA5E9;
      color: #fff;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 20px rgba(14,165,233,0.7);
    }

    a:active {
      transform: scale(0.98);
    }
  </style>
</head>
