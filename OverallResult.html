<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Overall Result</title>
  <meta name="viewport" content="width=1920, initial-scale=1.0">

  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" as="style" onload="this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  </noscript>

  <link rel="stylesheet" href="css/OverallResult.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>OVERALL STANDING</h1>
    </div>

    <div class="main-content">
      <div class="left-side">
        <div class="first-place-block" id="first-place-block" style="display: none;">
          <div class="first-place-header">
            <div class="first-place-rank">#1</div>
            <div class="first-place-team-info">
              <img class="first-place-logo" id="first-logo" src="" alt="">
              <div class="first-place-team-name" id="first-team-name">TEAM NAME</div>
            </div>
          </div>

          <div class="first-place-content">
            <div class="characters-section">
              <img src="assets/c1.png" class="character-img" alt="Character 1">
              <img src="assets/c2.png" class="character-img" alt="Character 2">
              <img src="assets/c3.png" class="character-img" alt="Character 3">
              <img src="assets/c4.png" class="character-img" alt="Character 4">
            </div>

            <div class="first-place-stats">
              <div class="first-stat">
                <div class="first-stat-label">WWCD</div>
                <div class="first-stat-value" id="first-wwcd">0</div>
              </div>
              <div class="first-stat">
                <div class="first-stat-label">PP</div>
                <div class="first-stat-value" id="first-pp">0</div>
              </div>
              <div class="first-stat">
                <div class="first-stat-label">FP</div>
                <div class="first-stat-value" id="first-fp">0</div>
              </div>
              <div class="first-stat first-stat-total">
                <div class="first-stat-label">TP</div>
                <div class="first-stat-value" id="first-tp">0</div>
              </div>
            </div>
          </div>
        </div>

        <div class="second-block">
          <table id="table-left">
            <thead>
              <tr>
                <th>#</th>
                <th>TEAM NAME</th>
                <th>WWCD</th>
                <th>PP</th>
                <th>FP</th>
                <th>TP</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="right-side">
        <div class="third-block">
          <table id="table-right">
            <thead>
              <tr>
                <th>#</th>
                <th>TEAM NAME</th>
                <th>WWCD</th>
                <th>PP</th>
                <th>FP</th>
                <th>TP</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="js/OverallResult.js"></script>
</body>
</html>
