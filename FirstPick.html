<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>First Pick Overlay</title>
  <link rel="stylesheet" href="css/FirstPick.css" />
</head>
<body>
  <div class="first-pick-overlay" id="first-pick-overlay">
    <div class="pick-main-bar">
      <div class="character-wrap">
        <img src="" alt="Character" class="character-img" id="characterImg" />
      </div>

      <div class="pick-title-wrap">
        <div class="pick-title">FIRST PICK</div>
      </div>

      <div class="name-bar">
        <div class="player-name" id="playerName">PLAYER NAME</div>
      </div>
    </div>
  </div>

  <script src="js/FirstPick.js"></script>
</body>
</html>
